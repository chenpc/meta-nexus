# Layer configuration for meta-nexus
BBPATH .= ":${LAYERDIR}"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "meta-nexus"
BBFILE_PATTERN_meta-nexus = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-nexus = "6"

LAYERDEPENDS_meta-nexus = "core"
LAYERSERIES_COMPAT_meta-nexus = "scarthgap whinlatter"
